name: Publish chorus-client

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: crates-io-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish chorus-client to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install the pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.51.1

      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="$(
            cargo metadata --no-deps --format-version 1 |
              jq -r '.packages[] | select(.name == "chorus-client") | .version'
          )"
          expected_tag="v${version}"
          if [[ "$RELEASE_TAG" != "$expected_tag" ]]; then
            echo "release tag $RELEASE_TAG does not match chorus-client $version ($expected_tag)" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "release tag must point to a commit on origin/main" >&2
            exit 1
          fi

      - name: Run release gate
        working-directory: ${{ github.workspace }}
        run: task release-check

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish package
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p chorus-client --locked
